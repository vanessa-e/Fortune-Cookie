<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glücksspruch</title>

<style>

body{
margin:0;
height:100vh;
background:#FFDDE4;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
position:relative;
overflow:hidden;
}

/* Kreis bleibt nach goldenem Schnitt positioniert */

#circle{
width:14cm;
height:14cm;
background:#FFE4E1;
border-radius:50%;
position:absolute;

left:38.2%;
top:38.2%;

transform:translate(-50%,-50%);
}

/* Spruch jetzt exakt Bildschirmmitte */

#quote-box{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

width:240px;
height:60px;

background:#ffffff;

display:flex;
align-items:center;
justify-content:center;

text-align:center;
padding:10px;

font-size:1.05rem;
font-weight:500;
color:#000;

box-shadow:0 4px 8px rgba(0,0,0,0.1);

/* keine Rundungen */
border-radius:0;

opacity:0;
transition:opacity 1s ease;
}

#quote-box.show{
opacity:1;
}

</style>
</head>

<body>

<div id="circle"></div>

<div id="quote-box"></div>

<script>

const quotes = [

"Ein kleines Wunder erwartet dich heute.",
"Dein Lächeln verändert die Welt.",
"Mut wächst mit jedem neuen Versuch.",
"Heute darfst du stolz auf dich sein.",
"Die Freude, die du gibst, kehrt zurück.",
"Etwas Unerwartetes bringt dir Glück.",
"Du wirst heute jemanden zum Lächeln bringen.",
"Ein guter Tag, um Neues zu wagen.",
"Neuer Tag, neues Glück! Du hast Glück!"

];

window.addEventListener('load',()=>{

const quoteBox=document.getElementById('quote-box');

const random=Math.floor(Math.random()*quotes.length);

quoteBox.textContent=quotes[random];

setTimeout(()=>{

quoteBox.classList.add('show');

},200);

});

</script>

</body>
</html>
