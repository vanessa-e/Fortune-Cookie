<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glückskeks</title>
<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#FFDDE4; /* pudriges Rosa */
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:#333;
    text-align:center;
    padding:2rem;
}
#cookie-container {
    position: relative;
    width: 150px;
    height: 80px;
    perspective: 600px;
    margin-bottom:2rem;
}
.half {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://upload.wikimedia.org/wikipedia/commons/7/7c/Fortune_cookie_icon.png') no-repeat center/contain;
    background-size: contain;
    transition: transform 1s ease;
}
.half.left {
    transform-origin: right center;
}
.half.right {
    transform-origin: left center;
}
.half.open-left {
    transform: rotateZ(-45deg) translateX(-50px) translateY(-20px);
}
.half.open-right {
    transform: rotateZ(45deg) translateX(50px) translateY(-20px);
}
.quote {
    max-width:600px;
    font-size:1.6rem;
    line-height:1.6;
    opacity:0;
    transition: opacity 1s ease;
}
</style>
</head>
<body>
<div id="cookie-container">
    <div class="half left" id="left-half"></div>
    <div class="half right" id="right-half"></div>
</div>
<div class="quote" id="quote"></div>

<script>
const quotes = [
"Heute ist ein guter Tag, um sich selbst freundlich zuzunicken.",
"Du musst nicht perfekt sein. Nur echt – das reicht völlig.",
"Ein Lächeln steht dir besser als jeder Filter.",
"Dein Kaffee wird heute besonders gut schmecken. Vertrau mir.",
"Du bringst mehr Licht in Räume, als du denkst.",
"Selbst kleine Schritte hinterlassen große Spuren.",
"Irgendwer denkt heute an dich – wahrscheinlich mit einem Lächeln.",
"Mut steht dir. Auch in kleinen Portionen.",
"Wenn Plan A nicht klappt, lächle und probier Plan B. Oder Snack.",
"Heute darfst du stolz auf dich sein. Einfach so.",
"Dein Humor ist eine Superkraft. Bitte weiter benutzen.",
"Das Leben mag Überraschungen. Zum Glück magst du sie auch."
];

window.addEventListener('load', () => {
    const left = document.getElementById('left-half');
    const right = document.getElementById('right-half');
    const quote = document.getElementById('quote');

    // Keks aufplatzen nach 1 Sekunde
    setTimeout(() => {
        left.classList.add('open-left');
        right.classList.add('open-right');
    }, 1000);

    // Spruch einblenden nach 2 Sekunden
    setTimeout(() => {
        const random = Math.floor(Math.random() * quotes.length);
        quote.textContent = quotes[random];
        quote.style.opacity = 1;
    }, 2000);
});
</script>
</body>
</html>
