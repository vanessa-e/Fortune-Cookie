<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glücksspruch</title>
<style>
body {
    margin: 0;
    height: 100vh;
    background: #FFDDE4; /* pudrig rosa */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    position: relative;
    overflow: hidden;
}

#circle {
    width: 14cm; 
    height: 14cm; 
    background: #FFE4E1; /* hellrosa Kreis */
    border-radius: 50%; /* kreisrund */
    position: absolute;
    /* Goldener Schnitt */
    left: 38.2%;   /* ca. 61,8% vom linken Rand für Mittelpunkt? */
    top: 38.2%;    /* leicht nach oben */
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse 3s ease-in-out infinite alternate;
}

#quote-box {
    width: 220px;
    height: 55px; /* Verhältnis 4:1 */
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 10px;
    font-size: 1.05rem;
    font-weight: 500;
    color: #000;
    border-radius: 6px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 1s ease, transform 1s ease;
}

#quote-box.show {
    opacity: 1;
    transform: translateY(0);
}

@keyframes pulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.03); }
}
</style>
</head>
<body>

<div id="circle">
    <div id="quote-box"></div>
</div>

<script>
const quotes = [
"Ein kleines Wunder erwartet dich heute.",
"Dein Lächeln verändert die Welt.",
"Mut wächst mit jedem neuen Versuch.",
"Heute darfst du stolz auf dich sein.",
"Die Freude, die du gibst, kehrt zurück.",
"Etwas Unerwartetes bringt dir Glück.",
"Du wirst heute jemanden zum Lächeln bringen.",
"Ein guter Tag, um Neues zu wagen."
];

window.addEventListener('load', () => {
    const quoteBox = document.getElementById('quote-box');
    const random = Math.floor(Math.random() * quotes.length);
    quoteBox.textContent = quotes[random];

    // Fade-In aktivieren
    setTimeout(() => {
        quoteBox.classList.add('show');
    }, 200);
});
</script>

</body>
</html>
