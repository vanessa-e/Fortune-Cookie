<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glückskeks</title>
<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#FFDDE4; /* pudrig rosa */
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

#cookie-container {
    position: relative;
    width: 200px;
    height: 100px;
    perspective: 600px;
}

/* Keks-Hälften */
.half {
    position: absolute;
    width: 100%;
    height: 100%;
    transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
}
.half.left {
    transform-origin: right center;
}
.half.right {
    transform-origin: left center;
}

/* SVG-Hälften */
.half svg {
    width: 100%;
    height: 100%;
}

/* Animation beim Aufplatzen */
.half.open-left {
    transform: rotateZ(-45deg) translateX(-60px) translateY(-10px);
}
.half.open-right {
    transform: rotateZ(45deg) translateX(60px) translateY(-10px);
}

/* Spruch, der aus dem Keks kommt */
#quote {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, 20px);
    max-width:180px;
    text-align:center;
    font-size:1rem;
    line-height:1.4;
    font-weight:500;
    color:#333;
    opacity:0;
    transition: opacity 0.8s ease, transform 0.8s ease;
}
#quote.show {
    opacity:1;
    transform: translate(-50%, 0px);
}
</style>
</head>
<body>

<div id="cookie-container">
    <!-- Linke Keks-Hälfte -->
    <div class="half left" id="left-half">
        <svg viewBox="0 0 100 50">
            <path d="M0,50 C25,0 75,0 100,50 Z" fill="#F5DEB3"/>
        </svg>
    </div>
    <!-- Rechte Keks-Hälfte -->
    <div class="half right" id="right-half">
        <svg viewBox="0 0 100 50">
            <path d="M0,50 C25,0 75,0 100,50 Z" fill="#F5DEB3"/>
        </svg>
    </div>
    <!-- Spruch -->
    <div id="quote"></div>
</div>

<script>
const quotes = [
"Ein kleines Wunder erwartet dich heute.",
"Dein Lächeln verändert die Welt.",
"Mut wächst mit jedem neuen Versuch.",
"Heute darfst du stolz auf dich sein.",
"Die Freude, die du gibst, kehrt zurück.",
"Etwas Unerwartetes bringt dir Glück.",
"Du wirst heute jemanden zum Lächeln bringen.",
"Ein guter Tag, um Neues zu wagen."
];

window.addEventListener('load', () => {
    const left = document.getElementById('left-half');
    const right = document.getElementById('right-half');
    const quote = document.getElementById('quote');

    // Keks aufplatzen
    setTimeout(() => {
        left.classList.add('open-left');
        right.classList.add('open-right');
        // Spruch kurz danach
        setTimeout(() => {
            const random = Math.floor(Math.random() * quotes.length);
            quote.textContent = quotes[random];
            quote.classList.add('show');
        }, 500);
    }, 1000);
});
</script>

</body>
</html>
