<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glücksspruch</title>
<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#FFDDE4; /* pudrig rosa */
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

#circle {
    width: 250px;
    height: 250px;
    background: #FFE4E1; /* hellrosa Kreis */
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

#quote-box {
    width: 200px;
    height: 50px; /* Verhältnis 4:1 */
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 10px;
    font-size: 1rem;
    font-weight: 500;
    color: #000;
    border-radius: 5px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<div id="circle">
    <div id="quote-box"></div>
</div>

<script>
const quotes = [
"Ein kleines Wunder erwartet dich heute.",
"Dein Lächeln verändert die Welt.",
"Mut wächst mit jedem neuen Versuch.",
"Heute darfst du stolz auf dich sein.",
"Die Freude, die du gibst, kehrt zurück.",
"Etwas Unerwartetes bringt dir Glück.",
"Du wirst heute jemanden zum Lächeln bringen.",
"Ein guter Tag, um Neues zu wagen."
];

// Spruch zufällig auswählen
window.addEventListener('load', () => {
    const quoteBox = document.getElementById('quote-box');
    const random = Math.floor(Math.random() * quotes.length);
    quoteBox.textContent = quotes[random];
});
</script>

</body>
</html>
