<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glückskeks</title>
<style>

/* 📌 Grundlayout */
body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FFDDE4; /* pudrig rosa */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

/* 📌 Kekscontainer */
#cookie {
    position: relative;
    width: 180px;
    height: 100px;
}

/* 🍪 Geschlossene Keksform */
.cookie-base {
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at center, #F5DEB3 60%, #E8C89C 95%);
    border-radius: 50% 50% 45% 45%;
    box-shadow: inset -4px -4px 8px rgba(0,0,0,0.15);
    transition: transform 0.8s ease-in-out;
}

/* 🍪 Aufplatz‑Animation */
.cookie-base.open {
    transform: scaleX(1.1) scaleY(1.1) translateY(-10px);
}

/* 📜 Sprucht bzw. Zettel */
#fortune {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, 20px);
    opacity: 0;
    text-align: center;
    font-size: 1.6rem;
    line-height: 1.5;
    font-weight: 500;
    width: 220px;
    color: #333;
    transition: opacity 1s ease, transform 0.7s ease;
}
#fortune.visible {
    opacity: 1;
    transform: translate(-50%, 0px);
}

</style>
</head>
<body>

<div id="cookie">
    <div class="cookie-base" id="cookie-base"></div>
    <div id="fortune"></div>
</div>

<script>
// 🎲 Sprüche‑Pool
const quotes = [
    "Heute erwartet dich ein kleines Wunder.",
    "Ein Lächeln kann deinen Tag verändern.",
    "Du bringst mehr Freude in die Welt als du denkst.",
    "Mut wächst mit jedem neuen Versuch.",
    "Deine Kreativität leuchtet heute hell.",
    "Ein unerwartetes Glück kommt auf dich zu.",
    "Heute dürftest du jemanden zum Lächeln bringen.",
    "Es ist ein guter Tag, um etwas Neues zu wagen."
];

// 🍪 Animation & Text‑Einblendung nach Laden
window.addEventListener('load', () => {
    const cookieBase = document.getElementById('cookie-base');
    const fortuneText = document.getElementById('fortune');

    // Zufälligen Spruch auswählen
    const random = Math.floor(Math.random() * quotes.length);
    fortuneText.textContent = quotes[random];

    // 🍪 Öffnen nach kurzer Verzögerung
    setTimeout(() => {
        cookieBase.classList.add('open');
        setTimeout(() => {
            fortuneText.classList.add('visible');
        }, 500); // Text erscheint nach Öffnen
    }, 800);
});

</script>

</body>
</html>
